pipeline:
  target_fps: 25
  target_width: 1280
  target_height: 720
  stabilize: false
  court_gate: false
  pose_keyframe_interval: 3
  pose_on_ball_contact_only: true
  detection_stride: 4

models:
  player_detector: yolo11n.pt
  player_tracker: botsort.yaml
  person_conf: 0.35
  max_players: 4
  temporal_smooth_frames: 3
  use_onnx: false
  # Ball detector: 'yolo' uses fine-tuned padel ball model (recommended after training)
  # Switch to 'heuristic' if weights not yet trained
  ball_detector: yolo                          # yolo | heuristic
  ball_yolo_weights: weights/padel_ball_yolo11n.pt
  ball_yolo_conf: 0.20                         # low conf — Kalman handles noise
  # Court keypoints: 'true' uses fine-tuned YOLOv8-pose model
  pose: mediapipe                              # rtmpose | vitpose | mediapipe
  stroke_model: heuristic                      # videomae | slowfast | heuristic
  device: mps                                 # auto | mps | cuda | cpu

phone:
  enabled: true
  auto_enable: true
  denoise: true

court:
  recompute_interval: 30
  court_length_m: 20.0
  court_width_m: 10.0
  wall_offset_m: 3.0
  use_manual_calibration: false
  use_yolo_court: true
  yolo_court_weights: weights/padel_court_keypoints.pt  # after training court model
  yolo_court_conf: 0.25
  landmark_count: 13

active_play:
  enabled: true
  ignore_audience_closeup: true
  closeup_bbox_area_ratio: 0.28
  min_players_on_court: 2
  min_ball_speed_kmh: 4.0
  min_ball_conf: 0.18
  min_player_motion_mps: 0.9
  dead_time_ball_idle_s: 2.5
  ball_activity_tail_s: 1.2
  audio_hit_window_s: 1.0
  min_active_segment_s: 1.5
  merge_gap_s: 2.0

strokes:
  min_shot_gap_s: 0.50
  global_shot_gap_s: 0.50
  contact_max_dist_px: 120

rally:
  min_duration_s: 1.5
  min_bounces: 1
  min_shots: 2
  ball_stationary_s: 1.2
  point_gap_s: 3.5           # shot-cluster gap fallback (~3 points on phone clips)
  point_min_shots: 2
  min_active_point_s: 4.0    # drop active-play tails shorter than this
  min_active_point_shots: 2   # min debounced hits to count as a point
  fsm_min_dwell_s: 1.5
  point_end_post_window_s: 2.0
  point_end_ball_lost_s: 3.0

ball:
  bounce_speed_drop: 0.35
  wall_direction_change_deg: 45
  kalman_max_miss_frames: 5
  max_speed_kmh: 120         # clamp Kalman noise before highlights/reports

audio:
  rally_hints: false

analytics:
  sprint_threshold_mps: 3.2
  sprint_min_duration_s: 0.4
  net_approach_distance_m: 2.5
  recovery_centroid_radius_m: 1.2
  partner_spacing_ideal_m: 3.0

events:
  long_rally_shots: 10
  wall_exchange_min: 2
  net_approach_min_gap_s: 3.0   # cooldown after edge-triggered approach (~90 frames at 30fps)

highlights:
  top_k: 12
  preroll_frames: 75
  postroll_frames: 60
  min_excitement: 40
  merge_overlap_s: 2.0
  weights: [0.15, 0.25, 0.2, 0.15, 0.25]  # length, speed, walls, shots, movement

coach_highlights:
  enabled: true
  shot_preroll_s: 3
  shot_postroll_s: 3
  rally_preroll_s: 1
  rally_postroll_s: 1.5
  max_rally_highlight_s: 35
  max_per_category: 8
  category_caps:              # tighter caps for spam-prone categories
    net_battle: 2
    best_defense: 4
  top_moments: 10
  # Annotated video export settings
  annotate_clips: true              # draw overlays on highlight clips
  annotation_style: broadcast       # broadcast | minimal
  ball_trail_frames: 12             # how many past ball positions to draw
  show_mini_court: true             # top-down court diagram
  show_speed_meter: true            # ball speed gauge
  show_excitement_bar: true         # excitement level indicator
  show_player_ids: true             # player bounding boxes + team color labels
  annotation_output_suffix: _annotated  # annotated clips get this suffix

summarization:
  provider: template  # ollama | api
  ollama_url: http://localhost:11434
  ollama_model: qwen2.5:7b
  temperature: 0.3

selection:
  mode: single  # single | pair | all
  auto_pick_near_side: true

intelligence:
  enabled: true

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_reports: data/reports
  weights: weights

api:
  host: 0.0.0.0
  port: 8001
  max_upload_mb: 2048
