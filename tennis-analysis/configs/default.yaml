pipeline:
  target_fps: 25
  target_width: 1280
  target_height: 720
  stabilize: false
  court_gate: false
  pose_keyframe_interval: 3
  pose_on_ball_contact_only: true
  detection_stride: 4  # every 4th frame; interpolate tracks between

models:
  player_detector: yolo11n.pt
  player_tracker: botsort.yaml
  person_conf: 0.35
  temporal_smooth_frames: 3
  use_onnx: false
  ball_detector: heuristic  # tracknet | heuristic
  pose: mediapipe
  device: auto

phone:
  enabled: true
  auto_enable: true
  denoise: true

court:
  recompute_interval: 30
  court_length_m: 23.77
  court_width_m: 10.97
  singles_width_m: 8.23
  use_manual_calibration: true

rally:
  min_duration_s: 3.0
  min_bounces: 2
  min_shots: 3
  ball_stationary_s: 1.5

ball:
  bounce_speed_drop: 0.4

audio:
  rally_hints: true

analytics:
  sprint_threshold_mps: 3.0
  sprint_min_duration_s: 0.5
  net_approach_distance_m: 3.0
  recovery_centroid_radius_m: 1.0

events:
  long_rally_shots: 8
  serve_toss_height_px: 40

highlights:
  top_k: 10
  preroll_frames: 90
  postroll_frames: 60
  min_excitement: 45
  merge_overlap_s: 2.0
  weights: [0.2, 0.3, 0.15, 0.15, 0.2]

summarization:
  provider: template
  ollama_url: http://localhost:11434
  ollama_model: llama3.1:8b
  temperature: 0.3

paths:
  data_raw: data/raw
  data_processed: data/processed
  data_reports: data/reports
  weights: weights

api:
  host: 0.0.0.0
  port: 8000
  max_upload_mb: 2048
